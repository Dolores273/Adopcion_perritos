<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Adopción de Perritos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    
    <h1>🐾 Perritos en Catálogo</h1>
    
    
    <div class="grid-catalog">
        {% for dog in dogs %}
        <div class="dog-card">
            
            <img src="{{ dog.image }}" alt="{{ dog.name }}">
            
            <h2>{{ dog.name }}</h2>
            <p><strong>Edad:</strong> {{ dog.age }} años</p>
            <p><strong>Raza:</strong> {{ dog.breed }}</p>
            
            <a href="/adoptar/{{ dog.id }}" class="btn">
                ¡Adóptame!
            </a>

        </div>
        {% endfor %}
    </div>

    <hr>

    
    <div class="historial-container">
        <a href="/historial" class="btn historial-btn">
            Ver Historial de Adopciones 💖
        </a>
    </div>

</div>

</body>
</html>
